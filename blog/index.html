---
layout: default
title: Blog
permalink: /blog/
---

<h1>IELTS, PTE & CELPIP Preparation Guides</h1>

<div class="blog-grid">

{% for post in site.posts %}

<div class="blog-card">

<a href="{{ post.url }}">
<img src="{{ post.image }}" alt="{{ post.title }}">
</a>

<div class="blog-content">

<a href="{{ post.url }}">
<h3>{{ post.title }}</h3>
</a>

<p>{{ post.description }}</p>

<p class="blog-meta">
Category: {{ post.category }}
</p>

</div>

</div>

{% endfor %}

</div>
